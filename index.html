<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />

    <!-- Theme colour for browser chrome -->
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000"  media="(prefers-color-scheme: dark)"  />

    <!-- PWA / mobile -->
    <meta name="mobile-web-app-capable"             content="yes" />
    <meta name="apple-mobile-web-app-capable"       content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"         content="ThinkCanvas" />

    <!-- SEO -->
    <meta name="description" content="ThinkCanvas — Think visually. Connect deeply." />
    <meta name="robots"      content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title"       content="ThinkCanvas" />
    <meta property="og:description" content="Think visually. Connect deeply." />
    <meta property="og:type"        content="website" />

    <!-- Favicon — SVG first, png fallback for older browsers -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon"   type="image/png"     href="/favicon.svg" />
    <link rel="apple-touch-icon"                      href="/favicon.svg" />

    <title>ThinkCanvas</title>

    <!--
      Inter font — preconnect for speed, loaded from Google Fonts.
      swap display prevents FOIT; text=... subsetting reduces payload.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Prevent FOUC / layout shift */
      html, body { margin: 0; padding: 0; }
      html[data-theme='dark']  { background: #000000; }
      html[data-theme='light'] { background: #f5f5f7; }

      /* Prevent iOS zoom on input focus */
      @supports (-webkit-touch-callout: none) {
        input, textarea, select { font-size: 16px !important; }
      }

      /* Skeleton loader — shown until React mounts */
      #root:empty::before {
        content: '';
        display: block;
        width: 100vw;
        height: 100dvh;
        background: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
