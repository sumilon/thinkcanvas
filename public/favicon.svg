<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Canvas / document outline -->
  <rect x="14" y="11" width="28" height="34" rx="3" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.45"/>
  <!-- Horizontal lines suggesting content -->
  <line x1="19" y1="21" x2="37" y2="21" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="19" y1="27" x2="37" y2="27" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.7"/>
  <line x1="19" y1="33" x2="30" y2="33" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-opacity="0.7"/>
  <!-- Connection dot cluster — top right -->
  <circle cx="46" cy="18" r="5" fill="white" fill-opacity="0.95"/>
  <circle cx="46" cy="32" r="5" fill="white" fill-opacity="0.95"/>
  <circle cx="46" cy="46" r="5" fill="white" fill-opacity="0.95"/>
  <!-- Connecting lines between dots -->
  <line x1="46" y1="23" x2="46" y2="27" stroke="white" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="46" y1="37" x2="46" y2="41" stroke="white" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Branch line from canvas to dots -->
  <line x1="42" y1="28" x2="46" y2="28" stroke="white" stroke-width="2" stroke-opacity="0.55"/>
</svg>
